<div class="themes-layout">
    <!-- COLUMNA 1: Catálogo de Temas y Selectores Globales -->
    <div class="themes-column catalog-column">
        <div class="column-header-title">
            <h3>Mis Temas</h3>
            <button id="btn-create-theme" class="btn-add-cat" title="Crear nuevo tema">+</button>
        </div>
        <div class="column-scroll-container">
            <ul id="themes-list"></ul>
        </div>

        <div class="globals-section">
            <h3>Temas Predeterminados</h3>
            <div class="form-group">
                <label for="select-global-bible">📖 Modo Biblia:</label>
                <select id="select-global-bible"></select>
            </div>
            <div class="form-group">
                <label for="select-global-songs">🎵 Modo Canciones:</label>
                <select id="select-global-songs"></select>
            </div>
            <div class="form-group">
                <label for="select-global-notes">📝 Notas Rápidas:</label>
                <select id="select-global-notes"></select>
            </div>
        </div>
    </div>

    <!-- COLUMNA 2: Editor Avanzado de Atributos (Formulario con Scroll) -->
    <div class="themes-column editor-column">
        <div class="column-header-title">
            <h3 id="editor-header-title">Editar Tema</h3>
        </div>
        
        <div class="column-scroll-container editor-form" id="theme-editor-form">
            <!-- Nombre -->
            <div class="form-group">
                <label for="theme-name">Nombre del Tema:</label>
                <input type="text" id="theme-name" placeholder="Ej: Adoración Azul">
            </div>

            <!-- Tipografía y Estilo -->
            <div class="form-group">
                <label for="theme-font-select">Tipografía (Letra):</label>
                <select id="theme-font-select"></select>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label for="theme-size-slider">Tamaño de letra:</label>
                    <span id="theme-size-val">5 vh</span>
                </div>
                <input type="range" id="theme-size-slider" min="3" max="10" step="0.5" value="5">
            </div>

            <!-- Ajustes de Tipografía Fina -->
            <div class="form-row">
                <div class="form-group">
                    <div class="label-row">
                        <label for="theme-line-height">Interlineado:</label>
                        <span id="theme-line-height-val">1.4</span>
                    </div>
                    <input type="range" id="theme-line-height" min="1.0" max="2.0" step="0.1" value="1.4">
                </div>
                <div class="form-group">
                    <div class="label-row">
                        <label for="theme-letter-spacing">Espaciado letras:</label>
                        <span id="theme-letter-spacing-val">0 px</span>
                    </div>
                    <input type="range" id="theme-letter-spacing" min="-2" max="10" step="1" value="0">
                </div>
            </div>

            <div class="form-row checkbox-row">
                <div class="form-checkbox-group">
                    <input type="checkbox" id="theme-check-bold">
                    <label for="theme-check-bold"><b>Negrita</b></label>
                </div>
                <div class="form-checkbox-group">
                    <input type="checkbox" id="theme-check-italic">
                    <label for="theme-check-italic"><i>Cursiva</i></label>
                </div>
                <div class="form-checkbox-group">
                    <input type="checkbox" id="theme-check-uppercase">
                    <label for="theme-check-uppercase">MAYÚSCULAS</label>
                </div>
            </div>

            <!-- Colores de Fuente y Sombra -->
            <div class="form-row">
                <div class="form-group">
                    <label for="theme-color">Color Texto:</label>
                    <input type="color" id="theme-color" value="#ffffff">
                </div>
                <div class="form-group">
                    <label for="theme-shadow-color">Color Sombra:</label>
                    <input type="color" id="theme-shadow-color" value="#000000">
                </div>
            </div>

            <!-- Contorno (Text Stroke) -->
            <div class="form-group border-section">
                <div class="form-checkbox-group">
                    <input type="checkbox" id="theme-check-stroke">
                    <label for="theme-check-stroke">Activar contorno de letras</label>
                </div>
                <div class="form-row stroke-controls hidden" id="stroke-controls-row">
                    <div class="form-group">
                        <label for="theme-stroke-color">Color contorno:</label>
                        <input type="color" id="theme-stroke-color" value="#000000">
                    </div>
                    <div class="form-group">
                        <div class="label-row">
                            <label for="theme-stroke-width">Grosor:</label>
                            <span id="theme-stroke-width-val">1 px</span>
                        </div>
                        <input type="range" id="theme-stroke-width" min="1" max="5" step="0.5" value="1">
                    </div>
                </div>
            </div>

            <!-- Caja de Relleno del Texto (Bounding Box) -->
            <div class="form-group border-section">
                <div class="form-checkbox-group">
                    <input type="checkbox" id="theme-check-fillbox">
                    <label for="theme-check-fillbox">Activar caja de relleno de texto</label>
                </div>
                <div class="form-row fillbox-controls hidden" id="fillbox-controls-row">
                    <div class="form-group">
                        <label for="theme-fillbox-color">Color relleno:</label>
                        <input type="color" id="theme-fillbox-color" value="#000000">
                    </div>
                    <div class="form-group">
                        <div class="label-row">
                            <label for="theme-fillbox-opacity">Opacidad:</label>
                            <span id="theme-fillbox-opacity-val">50 %</span>
                        </div>
                        <input type="range" id="theme-fillbox-opacity" min="0" max="1" step="0.1" value="0.5">
                    </div>
                </div>
            </div>

            <!-- Alineaciones -->
            <div class="form-row">
                <div class="form-group">
                    <label>Alineación Horizontal:</label>
                    <div class="align-grid" id="align-h-grid">
                        <button class="btn-align" data-align="left" title="Izquierda">⬅</button>
                        <button class="btn-align" data-align="center" title="Centro">⏺</button>
                        <button class="btn-align" data-align="right" title="Derecha">➡</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Alineación Vertical:</label>
                    <div class="align-grid" id="align-v-grid">
                        <button class="btn-align" data-align="top" title="Arriba">▲</button>
                        <button class="btn-align" data-align="center" title="Centro">⏺</button>
                        <button class="btn-align" data-align="bottom" title="Abajo">▼</button>
                    </div>
                </div>
            </div>

            <!-- Título del Versículo (Referencia Bíblica) -->
            <div class="form-group border-section">
                <label for="theme-title-pos">Ubicación del Título (Biblia):</label>
                <select id="theme-title-pos">
                    <option value="top">Arriba del texto</option>
                    <option value="bottom">Abajo del texto</option>
                    <option value="bar-top">Fila de ancho completo (Arriba)</option>
                    <option value="bar-bottom">Fila de ancho completo (Abajo)</option>
                </select>
                <!-- Ajustes de la barra de título si se selecciona "Fila de ancho completo" -->
                <div class="form-row stroke-controls hidden" id="title-bar-controls-row">
                    <div class="form-group">
                        <label for="theme-title-bar-color">Color de faja:</label>
                        <input type="color" id="theme-title-bar-color" value="#000000">
                    </div>
                    <div class="form-group">
                        <div class="label-row">
                            <label for="theme-title-bar-opacity">Opacidad faja:</label>
                            <span id="theme-title-bar-opacity-val">60 %</span>
                        </div>
                        <input type="range" id="theme-title-bar-opacity" min="0" max="1" step="0.1" value="0.6">
                    </div>
                </div>
            </div>

            <!-- Tratamiento de Comentarios (Ocultar líneas //) -->
            <div class="form-group border-section">
                <div class="form-checkbox-group">
                    <input type="checkbox" id="theme-check-comments" checked>
                    <label for="theme-check-comments">Ocultar líneas de comentarios (//) en el proyector</label>
                </div>
            </div>

            <!-- Configuración del Fondo del Tema -->
            <div class="form-group">
                <label for="theme-bg-type">Tipo de Fondo:</label>
                <select id="theme-bg-type">
                    <option value="color">Color Sólido</option>
                    <option value="image">Imagen de la USB</option>
                    <option value="video">Loop de Video de la USB</option>
                </select>
            </div>

            <div class="form-group" id="group-bg-media" style="display: none;">
                <label for="theme-bg-media">Archivo de fondo:</label>
                <select id="theme-bg-media"></select>
            </div>

            <div class="form-group" id="group-bg-color">
                <label for="theme-bg-color">Color de fondo:</label>
                <input type="color" id="theme-bg-color" value="#131316">
            </div>

            <!-- Acciones -->
            <div class="form-actions">
                <button id="btn-delete-theme" class="btn danger" style="flex: 0.8;" disabled>Eliminar</button>
                <button id="btn-save-theme" class="btn primary" style="flex: 1.2;">Guardar Tema</button>
            </div>
        </div>
    </div>

    <!-- COLUMNA 3: Previsualizador del Tema en Vivo -->
    <div class="themes-preview-column">
        <div class="preview-header">
            <h2>Vista Previa del Tema</h2>
            <p>Se actualiza en tiempo real al mover los controles de la columna central.</p>
        </div>
        
        <div class="preview-display-container">
            <!-- Caja de Proyección en Miniatura 16:9 -->
            <div id="theme-preview-box" class="theme-preview-box">
                <!-- Capas de fondo simuladas -->
                <video id="preview-bg-video" class="preview-bg" loop muted style="display: none;"></video>
                <img id="preview-bg-image" class="preview-bg" style="display: none;">
                
                <!-- Letras centrándose de forma dinámica con Flexbox -->
                <div id="preview-text-overlay" class="preview-text-overlay">
                    <!-- Caja de relleno de texto única (Bounding Box) -->
                    <div id="preview-text-box" class="preview-text-box">
                        <!-- Cita de Biblia simulada (Título) -->
                        <div id="preview-title-bar" class="preview-title-bar" style="display: none;">Génesis 1:1</div>
                        
                        <div id="preview-text-content">Sublime gracia del Señor<br>Que a un pecador salvó.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
