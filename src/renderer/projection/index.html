<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Display - Proyección</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="display-container">
        <!-- CAPA DE FONDO: Loop de Video (silenciado y con reproducción automática) -->
        <video id="proj-bg-video" class="proj-bg" loop muted style="display: none;"></video>
        
        <!-- CAPA DE FONDO: Imagen estática -->
        <img id="proj-bg-image" class="proj-bg" style="display: none;">
        
        <!-- CAPA DE CONTENIDO: El texto proyectado encima -->
        <div id="texto-proyectado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
